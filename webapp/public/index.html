<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestão de Compras de Supermercado</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <section class="hero is-primary is-bold">
      <div class="hero-body">
        <div class="container">
          <h1 class="title">Gestão de Compras de Supermercado</h1>
          <h2 class="subtitle">Monitore sua despensa e saiba quando repor produtos.</h2>
        </div>
      </div>
    </section>

    <main class="section">
      <div class="container">
        <div class="columns is-variable is-8">
          <div class="column is-one-third">
            <div class="box">
              <h3 class="title is-5">Cadastrar novo produto</h3>
              <form id="product-form">
                <div class="field">
                  <label class="label" for="name">Nome</label>
                  <div class="control">
                    <input id="name" class="input" type="text" placeholder="Ex: Arroz" required />
                  </div>
                </div>

                <div class="field">
                  <label class="label" for="quantity">Quantidade atual</label>
                  <div class="control">
                    <input id="quantity" class="input" type="number" min="0" value="0" required />
                  </div>
                </div>

                <div class="field">
                  <label class="label" for="minQuantity">Quantidade mínima</label>
                  <div class="control">
                    <input id="minQuantity" class="input" type="number" min="0" value="0" />
                  </div>
                </div>

                <div class="field">
                  <div class="control">
                    <button type="submit" class="button is-link is-fullwidth">Cadastrar</button>
                  </div>
                </div>
              </form>

              <div id="notification-container" class="notification is-hidden" role="status"></div>
            </div>
          </div>

          <div class="column">
            <div class="box">
              <div class="level mb-4">
                <div class="level-left">
                  <div>
                    <h3 class="title is-5">Produtos cadastrados</h3>
                    <p class="subtitle is-6">Verifique o status e a reposição necessária.</p>
                  </div>
                </div>
                <div class="level-right">
                  <button id="refresh-button" class="button is-outlined">Atualizar</button>
                </div>
              </div>

              <div id="loading-message" class="has-text-centered py-5">Carregando produtos...</div>
              <div class="table-container">
                <table class="table is-fullwidth is-hoverable" id="product-table">
                  <thead>
                    <tr>
                      <th>Nome</th>
                      <th>Quantidade</th>
                      <th>Qtd. mínima</th>
                      <th>Status</th>
                      <th>Criado em</th>
                    </tr>
                  </thead>
                  <tbody id="product-table-body"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script type="module" src="./js/app.js"></script>
  </body>
</html>
